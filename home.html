<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<meta http-equiv="X-UA-Compatible" content="ie=edge" />
		<title>Home</title>
		<link rel="stylesheet" href="css/lightbox.min.css" />
		<link rel="stylesheet" href="css/bootstrap.min.css" />
		<link rel="stylesheet" href="style.css" />
	</head>
	<body>
		<div class="container">
			<div class="heading">
				<h1 class="head text-center">lightbox</h1>
			</div>

			<div class="light-box">
				<a href="img/ansu.jpg" data-lightbox="image-1">
					<img
						src="img/small-ansu.jpg"
						alt="Small img"
						class="img-fluid lightbox-img"
					/>
				</a>
				<a href="img/1.jpg" data-lightbox="image-1">
					<img
						src="img/1small.jpg"
						alt="Small img"
						class="img-fluid lightbox-img"
					/>
				</a>
				<a href="img/big.jpg" data-lightbox="image-1">
					<img
						src="img/small.jpg"
						alt="Small img"
						class="img-fluid lightbox-img"
					/>
				</a>
			</div>

			<div class="light-box mt-5">
				<a href="img/light1-big.jpg" data-lightbox="image-2">
					<img
						src="img/light1.jpg"
						alt="Small img"
						class="img-fluid lightbox-img2"
					/>
				</a>
				<a href="img/light3-big.jpg" data-lightbox="image-2">
					<img
						src="img/light3.jpg"
						alt="Small img"
						class="img-fluid lightbox-img2"
					/>
				</a>
				<a href="img/light2-big.jpg" data-lightbox="image-2">
					<img
						src="img/light2.jpg"
						alt="Small img"
						class="img-fluid lightbox-img2"
					/>
				</a>
			</div>
		</div>
		<script src="js/jquery-3.6.0.min.js"></script>
		<script src="js/lightbox.min.js"></script>
		<script src="js/bootstrap.min.js"></script>
	</body>
</html>
